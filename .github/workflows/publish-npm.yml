name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================
  # CI: Continuous Integration
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Verify CLI binary is executable
        run: |
          echo "Verifying CLI binary..."
          test -f bin/apexcss-cli.js || (echo "bin/apexcss-cli.js not found" && exit 1)
          test -x bin/apexcss-cli.js || chmod +x bin/apexcss-cli.js
          echo "CLI binary verified"

      - name: Test CLI commands
        run: |
          echo "Testing CLI commands..."
          node bin/apexcss-cli.js --version
          node bin/apexcss-cli.js --help
          node bin/apexcss-cli.js doctor
          echo "CLI commands working"

  # ============================================
  # CD: Continuous Deployment
  # ============================================
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify CLI binary
        run: |
          echo "Verifying CLI binary..."
          test -f bin/apexcss-cli.js || (echo "bin/apexcss-cli.js not found" && exit 1)
          chmod +x bin/apexcss-cli.js
          echo "CLI binary ready"

      - name: Check if version exists on NPM
        id: check-version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view @apexcss/cli@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on NPM"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION does not exist on NPM"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM (Push to main)
        if: github.event_name == 'push' && steps.check-version.outputs.exists == 'false'
        run: |
          echo "Publishing version ${{ steps.check-version.outputs.version }} to NPM..."
          npm publish --access public
          echo "Published successfully!"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version exists)
        if: steps.check-version.outputs.exists == 'true'
        run: |
          echo "Skipping publish - version ${{ steps.check-version.outputs.version }} already exists on NPM"

      - name: Create Git Tag
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check-version.outputs.exists == 'false'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          chmod +x ./create-tag.sh
          ./create-tag.sh "v${{ steps.check-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check-version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.version }}
          name: v${{ steps.check-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
