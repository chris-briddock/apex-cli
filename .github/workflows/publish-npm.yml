name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================
  # CI: Lint + Test across Node.js versions
  # ============================================
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '23', '24']
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

  # ============================================
  # CI: Coverage (Node LTS only)
  # ============================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage --if-present

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # CI: Build + Smoke test
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build TypeScript
        run: npm run build

      - name: Verify CLI binary is executable
        run: |
          echo "Verifying CLI binary..."
          test -f dist/bin/apexcss-cli.js || (echo "dist/bin/apexcss-cli.js not found" && exit 1)
          test -x dist/bin/apexcss-cli.js || chmod +x dist/bin/apexcss-cli.js
          echo "CLI binary verified"

      - name: Smoke test CLI commands
        run: |
          echo "Testing CLI commands..."
          node dist/bin/apexcss-cli.js --version
          node dist/bin/apexcss-cli.js --help
          node dist/bin/apexcss-cli.js doctor
          node dist/bin/apexcss-cli.js completion bash
          echo "CLI commands working"

  # ============================================
  # CD: Publish to NPM (main branch only)
  # ============================================
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify CLI binary
        run: |
          echo "Verifying CLI binary..."
          test -f dist/bin/apexcss-cli.js || (echo "dist/bin/apexcss-cli.js not found" && exit 1)
          chmod +x dist/bin/apexcss-cli.js
          echo "CLI binary ready"

      - name: Check if version exists on NPM
        id: check-version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view apexcss-cli@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on NPM"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION does not exist on NPM"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM
        if: steps.check-version.outputs.exists == 'false'
        run: |
          echo "Publishing version ${{ steps.check-version.outputs.version }} to NPM..."
          npm publish --access public --provenance
          echo "Published successfully!"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version exists)
        if: steps.check-version.outputs.exists == 'true'
        run: echo "Skipping — version ${{ steps.check-version.outputs.version }} already on NPM"

      - name: Create GitHub Release
        if: steps.check-version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.version }}
          name: v${{ steps.check-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
